<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: rgba(0, 0, 0, 0.25);
      cursor: crosshair;
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      width: 100%;
    }
    #hint {
      backdrop-filter: blur(4px);
      background: rgba(15, 52, 96, 0.92);
      border: 1px solid rgba(233, 69, 96, 0.5);
      border-radius: 8px;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      left: 50%;
      padding: 8px 16px;
      pointer-events: none;
      position: fixed;
      top: 20px;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    #hint span { color: #888; }
    #tooltip {
      background: rgba(0, 0, 0, 0.8);
      border-radius: 4px;
      color: #4caf50;
      display: none;
      font-family: monospace;
      font-size: 12px;
      padding: 3px 8px;
      pointer-events: none;
      position: fixed;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="hint">Click anywhere to set launch position &nbsp;<span>· Esc to cancel</span></div>
  <div id="tooltip"></div>
  <script type="module" src="picker.js"></script>
</body>
</html>
