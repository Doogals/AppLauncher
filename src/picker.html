<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0f2040;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100%;
      overflow: hidden;
      user-select: none;
      width: 100%;
    }
    #shell {
      border: 2px dashed #e94560;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #body {
      align-items: center;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }
    #crosshair { color: #e94560; font-size: 2.5rem; opacity: 0.7; }
    #instructions { color: #888; font-size: 0.75rem; text-align: center; line-height: 1.7; }
    #footer {
      align-items: center;
      border-top: 1px solid #0f3460;
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
    }
    #size-display { color: #4caf50; font-family: monospace; font-size: 0.8rem; }
    .btn {
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 5px 14px;
    }
    #cancel-btn { background: none; border: 1px solid #333; color: #777; }
    #cancel-btn:hover { border-color: #e94560; color: #e94560; }
    #set-btn { background: #0f3460; border: 1px solid #4caf50; color: #4caf50; }
    #set-btn:hover { background: #4caf50; color: #0a1428; }
  </style>
</head>
<body>
  <div id="shell">
    <div id="body">
      <div id="crosshair">&#x2316;</div>
      <div id="instructions">
        Drag window to position &bull; drag edges to set size<br>
        This window = where your app will launch
      </div>
    </div>
    <div id="footer">
      <span id="size-display">-- x --</span>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="cancel-btn">Cancel</button>
        <button class="btn" id="set-btn">Set Position &amp; Size</button>
      </div>
    </div>
  </div>
  <script>
    function updateSize() {
      document.getElementById('size-display').textContent =
        window.innerWidth + ' x ' + window.innerHeight;
    }
    updateSize();
    window.addEventListener('resize', updateSize);

    function call(cmd) {
      if (window.__TAURI__ && window.__TAURI__.core) {
        window.__TAURI__.core.invoke(cmd);
      } else if (window.__TAURI_INVOKE__) {
        window.__TAURI_INVOKE__(cmd);
      }
    }

    document.getElementById('set-btn').addEventListener('click', function() {
      call('finish_location_picker');
    });
    document.getElementById('cancel-btn').addEventListener('click', function() {
      call('cancel_location_picker');
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') call('cancel_location_picker');
    });
  </script>
</body>
</html>
