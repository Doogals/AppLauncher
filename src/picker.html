<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0f2040;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      width: 100%;
    }
    #shell {
      border: 2px dashed #e94560;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #body {
      align-items: center;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
    }
    #crosshair { color: #e94560; font-size: 2.5rem; line-height: 1; opacity: 0.6; }
    #instructions { color: #666; font-size: 0.75rem; text-align: center; line-height: 1.6; }
    #footer {
      align-items: center;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      padding: 8px 12px;
    }
    #size-display {
      color: #4caf50;
      font-family: monospace;
      font-size: 0.8rem;
    }
    .btn {
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 5px 14px;
    }
    #cancel-btn {
      background: none;
      border: 1px solid #333;
      color: #777;
    }
    #cancel-btn:hover { border-color: #e94560; color: #e94560; }
    #set-btn {
      background: #0f3460;
      border: 1px solid #4caf50;
      color: #4caf50;
    }
    #set-btn:hover { background: #4caf50; color: #0a1428; }
  </style>
</head>
<body>
  <div id="shell">
    <div id="body">
      <div id="crosshair">&#x2316;</div>
      <div id="instructions">
        Drag to position &bull; resize edges to set size<br>
        This window = where your app will launch
      </div>
    </div>
    <div id="footer">
      <span id="size-display">0 &times; 0</span>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="cancel-btn">Cancel</button>
        <button class="btn" id="set-btn">Set Position &amp; Size</button>
      </div>
    </div>
  </div>
  <script type="module" src="picker.js"></script>
</body>
</html>
