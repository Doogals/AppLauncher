<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>App Launcher Widget</title>
</head>
<body>
  <div class="widget" id="widget">
    <span class="app-wordmark" id="app-wordmark">
      <img src="takeoff-logo-light.png" class="app-logo" id="app-logo" alt="" />
      <span class="app-wordmark-text">TakeOff</span>
    </span>
    <span class="close-btn-spacer" id="close-btn-spacer"></span>
    <button class="widget-close-btn" id="widget-close-btn" title="Close TakeOff">✕</button>
  </div>
  <script type="module" src="widget.js"></script>
</body>
</html>
