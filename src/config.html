<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <style>html, body { height: auto; }</style>
  <title>Edit Group</title>
</head>
<body>
  <div class="config-window">
    <div class="tab-bar">
      <button class="tab active" data-tab="group">Group</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>
    <div id="tab-group">
    <div class="config-header">
      <input type="text" class="icon-picker" id="icon-input" value="📁" maxlength="2" title="Click to change emoji" />
      <input type="text" class="name-input" id="name-input" placeholder="Group name..." />
    </div>
    <div id="emoji-grid" class="emoji-grid" style="display:none"></div>

    <p class="section-label">Items</p>
    <div class="items-list" id="items-list"></div>

    <div id="add-item-area">
      <div class="add-item-btn" id="add-item-btn">+ Add Item</div>
      <div id="add-type-menu" style="display:none; background:#16213e; border:1px solid #0f3460; border-radius:6px; padding:4px 0; margin-bottom:10px;">
        <div class="context-menu-item" data-type="app">🖥️ App / Executable</div>
        <div class="context-menu-item" data-type="winapp">🪟 Windows Apps</div>
        <div class="context-menu-item" data-type="file">📄 File</div>
        <div class="context-menu-item" data-type="url">🌐 URL / Bookmark</div>
        <div class="context-menu-item" data-type="folder">📁 Folder</div>
        <div class="context-menu-item" data-type="script">⚡ Script (.bat / .ps1)</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn btn-save" id="save-btn">Save</button>
    </div>

    <div class="config-bottom">
      <details class="license-details" id="license-details">
        <summary id="license-summary">🔑 License</summary>
        <div id="license-content"></div>
      </details>
      <button class="feedback-btn" id="feedback-btn">💬 Feedback</button>
    </div>
  </div>

  <div id="tab-settings" style="display:none">
    <div class="settings-section">
      <p class="section-label">Global Hotkey</p>
      <div class="hotkey-row">
        <input type="text" class="hotkey-input" id="hotkey-input" placeholder="Ctrl+Alt+Space" autocomplete="off" />
        <button class="btn btn-save" id="hotkey-save-btn">Save</button>
      </div>
      <div class="hotkey-save-status" id="hotkey-save-status"></div>
    </div>
    <div class="settings-section">
      <p class="section-label">Config File</p>
      <div class="io-row">
        <button class="btn btn-cancel" id="export-btn">⬆ Export Config</button>
        <button class="btn btn-cancel" id="import-btn">⬇ Import Config</button>
      </div>
    </div>
    <div class="settings-section">
      <p class="section-label">Share</p>
      <button class="btn btn-share" id="share-btn">📤 Share App Launcher</button>
    </div>
  </div>

  </div>
  <script type="module" src="config.js"></script>
</body>
</html>
