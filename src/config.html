<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { height: 100%; margin: 0; background: #1a1a2e; overflow: hidden; }
    .config-window { height: 100%; display: flex; flex-direction: column; box-sizing: border-box; }
    #tab-group { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .items-list { flex: 1; overflow-y: auto; min-height: 40px; margin-bottom: 8px; scrollbar-width: auto; scrollbar-color: #0f3460 transparent; }
    .items-list::-webkit-scrollbar { width: 8px; }
    .items-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
    .items-list::-webkit-scrollbar-track { background: transparent; }
    #add-item-area { flex-shrink: 0; }
    .btn-row { flex-shrink: 0; margin-top: 8px; }
    .config-bottom { flex-shrink: 0; }

    /* Free-tier / error modal */
    #error-modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    #error-modal-backdrop.visible { display: flex; }
    #error-modal {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 22px 24px 18px;
      max-width: 300px;
      width: 90%;
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.5;
    }
    #error-modal p { margin: 0 0 18px; }
    #error-modal .modal-btns {
      display: flex; gap: 8px; justify-content: flex-end;
    }
    #error-modal .btn-buy {
      background: #e07b39; color: #fff; border: none;
      border-radius: 6px; padding: 7px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #error-modal .btn-buy:hover { background: #c9692a; }
    #error-modal .btn-ok {
      background: transparent; color: #aaa;
      border: 1px solid #444; border-radius: 6px;
      padding: 7px 14px; font-size: 13px; cursor: pointer;
    }
    #error-modal .btn-ok:hover { color: #fff; border-color: #888; }
  </style>
  <title>Edit Group</title>
</head>
<body>
  <div class="config-window">
    <div class="tab-bar">
      <button class="tab active" data-tab="group">Group</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>
    <div id="tab-group">
    <div class="config-header">
      <input type="text" class="icon-picker" id="icon-input" value="📁" maxlength="2" title="Click to change emoji" autocomplete="off" />
      <input type="text" class="name-input" id="name-input" placeholder="Group name..." autocomplete="off" />
      <button class="btn btn-cancel" id="group-color-btn" title="Save the group first to set a custom color" style="flex-shrink:0;padding:8px 10px;" disabled>🎨</button>
    </div>
    <div id="emoji-grid" class="emoji-grid" style="display:none"></div>

    <div class="suggested-wrap" id="suggested-wrap">
      <span class="suggested-label">Suggested Items</span>
      <div class="suggested-bar" id="suggested-bar">
        <div class="suggested-loading"><span class="suggested-spinner"></span>Finding suggestions…</div>
      </div>
    </div>
    <div class="items-list" id="items-list"></div>

    <div id="add-item-area">
      <div class="add-item-btn" id="add-item-btn">+ Add Item</div>
      <div id="add-type-menu" style="display:none; background:#16213e; border:1px solid #0f3460; border-radius:6px; padding:4px 0; margin-bottom:10px;">
        <div class="context-menu-item" data-type="winapp">🪟 Windows Apps</div>
        <div class="context-menu-item" data-type="url">🌐 URL / Bookmark</div>
        <div class="context-menu-item" data-type="file">📄 File / Program</div>
        <div class="context-menu-item" data-type="folder">📁 Folder</div>
        <div class="context-menu-item" data-type="steam">🎮 Steam Game</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn btn-cancel" id="layout-btn">📐 Edit Layout</button>
      <button class="btn btn-save" id="save-btn">Save &amp; Close</button>
    </div>

    <div class="config-bottom">
      <details class="license-details" id="license-details">
        <summary id="license-summary">🔑 License</summary>
        <div id="license-content"></div>
      </details>
      <button class="feedback-btn" id="feedback-btn">💬 Feedback</button>
    </div>
  </div>

  <div id="tab-settings" style="display:none">
    <div class="settings-section">
      <p class="section-label">Widget Appearance</p>
      <button class="btn btn-cancel" id="widget-color-btn">🎨 Choose Widget Color</button>
    </div>
    <div class="settings-section">
      <p class="section-label">Global Hotkey</p>
      <div class="hotkey-row">
        <input type="text" class="hotkey-input" id="hotkey-input" placeholder="Ctrl+Alt+Space" autocomplete="off" />
        <button class="btn btn-cancel" id="hotkey-record-btn">⌨ Record</button>
        <button class="btn btn-save" id="hotkey-save-btn">Save</button>
      </div>
      <div class="hotkey-save-status" id="hotkey-save-status"></div>
    </div>
    <div class="settings-section">
      <p class="section-label">Config File</p>
      <div class="io-row">
        <button class="btn btn-cancel" id="export-btn">⬆ Export Config</button>
        <button class="btn btn-cancel" id="import-btn">⬇ Import Config</button>
      </div>
    </div>
    <div class="settings-section">
      <p class="section-label">Share</p>
      <button class="btn btn-share" id="share-btn">📤 Share TakeOff</button>
    </div>
  </div>

  </div>
  <!-- Free-tier / error modal -->
  <div id="error-modal-backdrop">
    <div id="error-modal">
      <p id="error-modal-msg"></p>
      <div class="modal-btns">
        <button class="btn-ok" id="error-modal-ok">OK</button>
        <button class="btn-buy" id="error-modal-buy" style="display:none">Buy License</button>
      </div>
    </div>
  </div>

  <script type="module" src="config.js"></script>
</body>
</html>
