<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
    .group-color-window {
      box-sizing: border-box;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Scoped copy of the global .tab-bar/.tab styling, calibrated to this
       window's own 16px padding (the global version assumes 20px). */
    .gc-tab-bar {
      display: flex;
      justify-content: center;
      border-bottom: 1px solid #0f3460;
      margin: -16px -16px 16px;
      width: calc(100% + 32px);
    }
    .gc-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      margin-bottom: -1px;
      padding: 10px 20px;
      transition: color 0.1s;
    }
    .gc-tab.active { border-bottom-color: #e94560; color: #e0e0e0; }
    .gc-tab:hover:not(.active) { color: #ccc; }

    /* Center the swatch grids */
    .group-color-swatches, .solid-color-swatches {
      justify-content: center;
      margin-bottom: 18px;
    }

    /* Done button */
    .gc-done-btn {
      width: 80%;
      padding: 8px 0;
      margin-top: 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .gc-done-btn:hover  { background: #c73652; }
    .gc-done-btn:active { transform: scale(0.98); }
  </style>
  <title>Group Color</title>
</head>
<body>
  <div class="group-color-window">
    <div class="gc-tab-bar">
      <button class="gc-tab active" data-tab="theme">Theme Colors</button>
      <button class="gc-tab" data-tab="solid">Solid Colors</button>
    </div>

    <div id="gc-tab-theme">
      <div class="color-swatches group-color-swatches" id="group-color-swatches"></div>
    </div>

    <div id="gc-tab-solid" style="display:none">
      <div class="color-swatches solid-color-swatches" id="solid-color-swatches"></div>
    </div>

    <button class="gc-done-btn" id="gc-done-btn">DONE</button>
  </div>
  <script type="module" src="group-color.js"></script>
</body>
</html>
